
<!DOCTYPE html>
<html>

<head>
    <title>Enterprise AI Assistant</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
        }

        #chatbox {
            width: 100%;
            height: 400px;
            border: 1px solid gray;
            overflow-y: scroll;
            padding: 10px;
            margin-bottom: 10px;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }

    </style>

</head>

<body>

<h2>Enterprise AI Assistant</h2>

<div id="chatbox"></div>

<input type="text" id="message" placeholder="Ask question">
<button onclick="sendMessage()">Send</button>

<script>

async function sendMessage() {

    const input =
        document.getElementById("message");

    const message =
        input.value;

    if (!message) {
        return;
    }

    const chatbox =
        document.getElementById("chatbox");

    chatbox.innerHTML +=
        `<p><b>You:</b> ${message}</p>`;

    input.value = "";

    try {

        const response = await fetch(
            "http://<VM-IP>:8000/chat",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    message: message
                })
            }
        );

        const data = await response.json();

        console.log(data);

        chatbox.innerHTML +=
            `<p><b>AI:</b> ${data.response}</p>`;

    }
    catch (error) {

        console.log(error);

        chatbox.innerHTML +=
            `<p><b>Error:</b> Backend not reachable</p>`;
    }

    chatbox.scrollTop =
        chatbox.scrollHeight;
}

</script>

</body>
</html>
